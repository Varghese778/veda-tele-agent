steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/veda-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/veda-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Step 2: Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/veda-backend:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=k8s/'
      - '--image=gcr.io/$PROJECT_ID/veda-backend:$SHORT_SHA'
      - '--location=us-central1'
      - '--namespace=default'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'

  # Step 4: Run integration tests
  - name: 'gcr.io/cloud-builders/docker'
    id: 'test-backend'
    args:
      - 'run'
      - '--rm'
      - 'gcr.io/$PROJECT_ID/veda-backend:$SHORT_SHA'
      - 'npm'
      - 'test'

images:
  - 'gcr.io/$PROJECT_ID/veda-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/veda-backend:latest'

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'veda-tele-agent-backend'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
